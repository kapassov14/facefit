.map-layout{gap:10px}.face-map{aspect-ratio:.94;border-radius:14px;margin-bottom:10px}.zone-svg text{font-size:6px}.legend{justify-content:flex-start;gap:7px 10px;font-size:11.5px}.dot{width:8px;height:8px}.map-zone-list{grid-template-columns:1fr;gap:5px;margin-top:10px}.map-zone-item{font-size:13.5px;line-height:1.35}

.avoid-list{gap:8px}.avoid-item{padding:12px 13px;font-size:14.5px}.cta{padding:20px 16px;border-radius:18px;gap:16px}.cta .lead{font-size:18px;line-height:1.35}.buttons{display:grid}.btn{width:100%;padding:13px 16px;font-size:11px;letter-spacing:.1em}

.metric{background:rgba(255,253,248,.72);border-color:rgba(111,133,114,.18);box-shadow:0 18px 36px -30px rgba(47,34,24,.45);backdrop-filter:blur(10px)}.metric:nth-child(2){background:linear-gradient(180deg,#f7ebe6,#fffaf2);border-color:rgba(185,130,120,.22)}.metric:nth-child(3){background:linear-gradient(180deg,#edf4ea,#fffaf2);border-color:rgba(111,133,114,.2)}.metric small,.label{color:#8d7866}.metric b{color:#312820}

.section{border-top:0;background:#fffdf8}.section:nth-of-type(even){background:linear-gradient(180deg,#f8f1e8,#fffdf8)}.section:nth-of-type(odd){background:linear-gradient(180deg,#fffdf8,#f6efe3)}.section-head{border-bottom:0;margin-bottom:28px}.section-head>div{position:relative;padding-left:18px}.section-head>div:before{content:"";position:absolute;left:0;top:.2em;bottom:.1em;width:3px;border-radius:999px;background:linear-gradient(180deg,var(--rose),var(--champagne))}.sec-num{color:var(--clay)}.sec-num:after{background:rgba(111,133,114,.38)}.sec-intro{color:#74665a}
.card,.note-card,.route-card,.wide-card,.chapter,.deep-zone,.zone-row,.highlight,.avoid-item{background:rgba(255,253,248,.86);border-color:var(--hairline);box-shadow:0 18px 44px -34px rgba(43,33,24,.44)}.wide-card{background:linear-gradient(180deg,#fffdf8,#faf3e9)}.wide-card:before{background:linear-gradient(180deg,var(--sage),var(--champagne))}.card p,.note-card p,.route-card p,.chapter p,.deep-zone p,.list li,.prose-p{color:#52483f}
.strength-notes{margin-top:16px}.strength-notes .note-card{background:#fffdf8}.strength-notes .note-card:nth-child(1){border-top:3px solid rgba(111,133,114,.55)}.strength-notes .note-card:nth-child(2){border-top:3px solid rgba(217,189,130,.62)}.strength-notes .note-card:nth-child(3){border-top:3px solid rgba(185,130,120,.48)}

.face-map{box-shadow:0 24px 48px -34px rgba(46,38,31,.46);border-color:rgba(111,133,114,.2)}.legend{color:#60554b}.map-zone-item{background:rgba(255,253,248,.72);border:1px solid rgba(46,38,31,.08);border-radius:999px;padding:6px 10px}.map-zone-item .zn{color:var(--clay)}
.deep-zone{background:#fffdf8}.deep-zone .num{background:#edf4ea;color:var(--sage)}.deep-zone-action{background:#f8f0e4;border-color:rgba(168,116,85,.12)}
.route-card{background:#fffdf8}.route-card:nth-child(1){border-top:3px solid rgba(111,133,114,.55)}.route-card:nth-child(2){border-top:3px solid rgba(217,189,130,.65)}.route-card:nth-child(3){border-top:3px solid rgba(185,130,120,.52)}.forecast-deep .note-card{background:#fffdf8}.forecast-deep .note-card:before{background:linear-gradient(180deg,var(--sage),var(--champagne))}
.note-list small{background:#f8f1e6;border-color:rgba(46,38,31,.08);color:#66594e}.avoid-item{background:#fbf5ed}.avoid-item:before{background:var(--rose)}

<body>
<div id="app" class="shell"></div>
<script>
const reportData = __REPORT_DATA_JSON__;
const reportToken = __REPORT_TOKEN_JSON__;
const esc = (value) => String(value ?? "").replace(/[&<>"']/g, (char) => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[char]));
const arr = (value) => Array.isArray(value) ? value : [];
const hasImage = (src) => Boolean(String(src ?? "").trim());
function ctaClick(){fetch(`/api/reports/${encodeURIComponent(reportToken)}/cta-click`,{method:"POST",headers:{"ngrok-skip-browser-warning":"true"}}).then((res)=>res.json()).then((data)=>{if(data&&data.target_url)window.location.href=data.target_url}).catch(()=>{})}
function photo(src,label,objectPosition,fallback){return hasImage(src)?`<div class="photo"><img data-protocol-image src="${esc(src)}" style="object-position:${esc(objectPosition||"50% 42%")}" alt="${esc(label)}"></div>`:`<div class="photo empty">${esc(fallback||"Изображение формируется")}</div>`}
function sectionId(num){return `section-${String(num).toLowerCase().replace(/[^a-zа-я0-9]+/gi,"-")}`}
function section(num,title,intro,body){return `<section class="section" id="${sectionId(num)}"><div class="section-head"><div><div class="sec-num">${esc(num)}</div><h2>${title}</h2></div>${intro?`<p class="sec-intro">${esc(intro)}</p>`:""}</div>${body}</section>`}
function list(items){return `<ul class="list">${arr(items).map((item)=>`<li>${esc(item)}</li>`).join("")}</ul>`}
function statusLabel(status){return {strong:"Сильная зона",attention:"Зона внимания",active_focus:"Активный фокус",priority:"Приоритет"}[status]||"Зона внимания"}
function statusFromColor(color){return {green:"strong",yellow:"attention",orange:"active_focus",red:"priority"}[color]||"attention"}
function zoneNum(value,fallback=50){const n=Number(value);if(!Number.isFinite(n))return fallback;return n>100?n/3:n}
function zonePath(points,close=true){const safe=arr(points).filter((p)=>Number.isFinite(Number(p?.x))&&Number.isFinite(Number(p?.y)));if(safe.length<2)return "";const path=safe.map((p,i)=>`${i?"L":"M"} ${zoneNum(p.x).toFixed(2)} ${zoneNum(p.y).toFixed(2)}`).join(" ");return close?`${path} Z`:path}
function shapePieces(zone,zoneMap){const status=zone.status||"yellow";const zoneId=String(zone.zone_id||zone.id||"").toLowerCase();const paintable=new Set(["forehead","cheeks","mouth_area"]);const quality=zoneMap?.quality||{};const canRenderDetailedMap=quality.ok!==false;if(!canRenderDetailedMap||!paintable.has(zoneId))return "";const shape=zone.shape||{};const clipId=zonePath(zoneMap?.contours?.face_oval,true)?"zoneFaceClipWeb":"";const clip=clipId?` clip-path="url(#${clipId})"`:"";const pieces=[];const ellipse=(s)=>{const cx=zoneNum(s.x??zone.cx),cy=zoneNum(s.y??zone.cy);const rx=Math.max(2.6,zoneNum(s.width??18)/2),ry=Math.max(2.2,zoneNum(s.height??10)/2);const rotation=Number(s.rotation||shape.rotation||0);return `<ellipse class="zone-soft-fill ${esc(status)}" cx="${cx}" cy="${cy}" rx="${rx}" ry="${ry}"${rotation?` transform="rotate(${rotation} ${cx} ${cy})"`:""}${clip}></ellipse>`};if(Array.isArray(shape.polygons)&&shape.polygons.length){shape.polygons.forEach((poly)=>{const d=zonePath(poly,true);if(d)pieces.push(`<path class="zone-soft-fill ${esc(status)}" d="${d}"${clip}></path>`)});return pieces.join("")}const parts=Array.isArray(shape.shapes)&&shape.shapes.length?shape.shapes:[shape];parts.forEach((part)=>pieces.push(ellipse(part)));return pieces.join("")}
function zoneMarker(zone){const x=zoneNum(zone.anchor?.x??zone.cx),y=zoneNum(zone.anchor?.y??zone.cy);const label=zone.number??zone.id;return `<text x="${x}" y="${y+1.25}" text-anchor="middle" font-family="Playfair Display, Georgia, serif" font-weight="700" font-size="5.2" fill="#111111">${esc(label)}</text>`}
function zoneMap(report){const zones=arr(report.zone_map?.zones);const facePath=zonePath(report.zone_map?.contours?.face_oval,true);const clip=facePath?`<clipPath id="zoneFaceClipWeb" clipPathUnits="userSpaceOnUse"><path d="${facePath}"></path></clipPath>`:"";const fills=zones.map((zone)=>shapePieces(zone,report.zone_map||{})).join("");const markers=zones.map(zoneMarker).join("");const mapPosition=report.images.map_object_position||"50% 58%";return `<div class="map-layout"><div><div class="face-map">${hasImage(report.images.before_image_url)?`<img data-protocol-image src="${esc(report.images.before_image_url)}" style="object-position:${esc(mapPosition)}" alt="Карта зон лица">`:""}<svg class="zone-svg" viewBox="0 0 100 100" preserveAspectRatio="none"><defs><filter id="zoneSoftBlurWeb" x="-35%" y="-35%" width="170%" height="170%"><feGaussianBlur stdDeviation="1.35" result="blur"></feGaussianBlur><feComponentTransfer><feFuncA type="linear" slope="1.18"></feFuncA></feComponentTransfer></filter>${clip}</defs>${fills}${markers}</svg></div><div class="legend"><span><i class="dot green"></i>Всё хорошо</span><span><i class="dot yellow"></i>Зона внимания</span><span><i class="dot orange"></i>Активный фокус</span><span><i class="dot red"></i>Приоритет</span></div><div class="map-zone-list">${zones.map((zone)=>`<div class="map-zone-item"><span class="zn">${esc(zone.number??zone.id)}</span>${esc(zone.title||zone.name)}</div>`).join("")}</div></div></div>`}
function paragraphs(text){return String(text||"").split(/\n{2,}/).map((part)=>part.trim()).filter(Boolean).map((part)=>`<p>${esc(part)}</p>`).join("")}
function textPieces(value){const source=Array.isArray(value)?value:[value];const pieces=[];source.forEach((item)=>{String(item??"").split(/\n{2,}/).map((part)=>part.trim()).filter(Boolean).forEach((part)=>{if(part.length<=310){pieces.push(part);return}const sentences=part.split(/(?<=[.!?])\s+/).filter(Boolean);let chunk="";sentences.forEach((sentence)=>{const next=chunk?`${chunk} ${sentence}`:sentence;if(next.length>260&&chunk){pieces.push(chunk);chunk=sentence}else{chunk=next}});if(chunk)pieces.push(chunk)})});return pieces}
function textBlock(items,mode=""){const pieces=textPieces(items);return `<div class="prose-flow ${mode}">${pieces.map((item,index)=>`<p class="prose-p ${index===0?"prose-lead":"prose-note"}">${esc(item)}</p>`).join("")}</div>`}
function highlights(items){return arr(items).length?`<div class="highlight-grid">${arr(items).map((item)=>`<div class="highlight">${esc(item)}</div>`).join("")}</div>`:""}
function chapters(items){return arr(items).length?`<div class="chapter-grid">${arr(items).map((item,index)=>`<article class="chapter"><span class="chapter-kicker">Раздел ${index+1}</span><h3>${esc(item.title)}</h3><p>${esc(item.text)}</p></article>`).join("")}</div>`:""}
function deepZones(items){return `<div class="deep-zones">${arr(items).map((zone)=>`<article class="deep-zone"><span class="num">${esc(zone.number)}</span><div class="deep-zone-copy"><h3>${esc(zone.title)}</h3><span class="status ${esc(statusFromColor(zone.status))}">${esc(zone.status_label||statusLabel(statusFromColor(zone.status)))}</span><p>${esc(zone.meaning)}</p><p>${esc(zone.analysis)}</p><p class="deep-zone-action"><b>Что даст работа:</b> ${esc(zone.action)}</p></div></article>`).join("")}</div>`}
function strategySteps(items){return `<div class="route">${arr(items).map((step,index)=>`<article class="route-card"><span class="step-kicker">Направление ${index+1}</span><h3>${esc(step.title)}</h3><p><b>Цель:</b> ${esc(step.goal)}</p><p><b>Зоны:</b> ${esc(arr(step.zones).join(", "))}</p><p>${esc(step.possible_effect)}</p></article>`).join("")}</div>`}
function forecastDeep(items){return `<div class="forecast-deep">${arr(items).map((item)=>`<article class="note-card"><span class="label">${esc(item.period)}</span><p>${esc(item.text)}</p><div class="note-list">${arr(item.how_to_notice).map((note)=>`<small>${esc(note)}</small>`).join("")}</div></article>`).join("")}</div>`}
function controlCards(items){return `<div class="grid-3" style="margin-top:16px">${arr(items).map((item)=>`<article class="card"><span class="label">${esc(item.title)}</span><p>${esc(item.text)}</p></article>`).join("")}</div>`}
function avoidList(items){return `<div class="avoid-list">${arr(items).map((item)=>`<div class="avoid-item"><span>${esc(item)}</span></div>`).join("")}</div>`}
function render(report){
  const finalButtons=report.final_cta||{};const deep=report.deep_report||{};const app=document.getElementById("app");
  app.innerHTML=`<div class="paper"><nav class="nav"><div class="brand"><div class="mark">BV</div><div><b>Bella Vladi</b><span>Face Protocol</span></div></div><div class="nav-meta">${esc(report.report_id||"")} · ${esc(report.client?.date||"")}</div></nav>
  <section class="hero"><div class="hero-copy"><div class="eyebrow">Bella Vladi · Face Protocol</div><h1>${esc(report.hero?.title||"Персональный протокол лица")}</h1><p class="lead">${esc(report.hero?.main_conclusion)}</p><div class="hero-meta"><div class="metric"><small>Визуальный возраст кожи</small><b>${esc(report.hero?.visual_age)}</b></div><div class="metric"><small>Тип старения</small><b>${esc(report.hero?.aging_type_short)}</b></div><div class="metric"><small>Сильные стороны</small><b>${esc(report.hero?.strengths_short||report.hero?.main_focus)}</b></div></div></div><div class="hero-visual"><div class="hero-photos single"><div class="photo-card"><span class="photo-tag">Фото</span>${photo(report.images?.before_image_url,"Фото",report.images?.before_object_position,"Фото загружается")}</div></div></div></section>
  <div class="mobile-section-nav"><a href="#section-01">01</a><a href="#section-02">02</a><a href="#section-03">03</a><a href="#section-04">04</a><a href="#section-05">05</a><a href="#section-карта">Карта</a><a href="#section-06">06</a><a href="#section-07">07</a><a href="#section-final">Итог</a></div>
  ${section("01","Главный вывод по фото",deep.intro?.title||"Что важно понять сразу",`<div class="wide-card">${textBlock(deep.intro?.text)}${highlights(deep.intro?.highlights)}</div>`)}
  ${section("02","Возраст и кожа","Простыми словами: как выглядит кожа сейчас, к чему она склонна и какой у неё потенциал.",`<div class="grid-2"><article class="card"><span class="label">${esc(deep.visual_age?.title)}</span>${textBlock(deep.visual_age?.text)}${list(deep.visual_age?.notes)}</article><article class="card"><span class="label">${esc(deep.skin_type?.label)}</span><h3>${esc(deep.skin_type?.title)}</h3>${textBlock(deep.skin_type?.text)}${list(deep.skin_type?.bullets)}</article></div>`)}
  ${section("03","Сильные стороны лица","Конкретные черты, которые уже создают гармонию и выразительность.",`<div class="wide-card strengths-copy">${textBlock(deep.strengths?.text)}</div><div class="grid-3 strength-notes">${arr(deep.strengths?.items).map((item)=>`<article class="note-card"><span class="label">${esc(item.title||"Сильная сторона")}</span><p>${esc(item.text)}</p></article>`).join("")}</div>`)}
  ${section("04","Ваш тип старения",deep.aging?.combo_note||"Тип определён по фото и карте зон.",`<div class="wide-card"><div class="quote-strip">${esc(deep.aging?.type_name)}</div>${textBlock(deep.aging?.text)}${arr(deep.aging?.evidence).length?`<div class="pill-row">${arr(deep.aging.evidence).map((item)=>`<span class="pill">${esc(item)}</span>`).join("")}</div>`:""}</div>${chapters(deep.aging?.chapters)}`)}
  ${section("05","Что будет со временем","Что может проявляться с возрастом и какие зоны лучше поддержать уже сейчас.",`<div class="grid-2"><article class="card">${textBlock(deep.future?.text)}</article><article class="card"><h3>${esc(deep.age_changes?.title)}</h3>${textBlock(deep.age_changes?.text)}</article></div>`)}
  ${section("Карта","Карта зон лица","Коротко: какие зоны стоит поддержать, чтобы лицо выглядело свежее и моложе.",`${zoneMap(report)}${deepZones(deep.zones?.items)}`)}
  ${section("06","Что даст фейс-фитнес",deep.strategy?.title||"Что даст фейс-фитнес именно вам",`<div class="wide-card">${textBlock(deep.strategy?.text)}${list(deep.strategy?.results)}</div>${strategySteps(deep.strategy?.steps)}`)}
  ${section("07","Прогноз по времени","Что может измениться при регулярной работе и как это спокойно проверить по фото.",`<div class="wide-card"><h3>${esc(deep.forecast?.title)}</h3><p>${esc(deep.forecast?.intro)}</p></div>${forecastDeep(deep.forecast?.items)}${controlCards(deep.forecast?.control)}<div class="wide-card" style="margin-top:16px"><h3>${esc(deep.avoid?.title)}</h3>${avoidList(deep.avoid?.items)}</div>`)}
  <section class="section" id="section-final"><div class="cta"><div><div class="sec-num">Итог</div><h2>${esc(deep.final?.title||finalButtons.title)}</h2>${textBlock(deep.final?.text||[report.final_summary?.text||finalButtons.text])}${deep.final?.quote?`<p class="lead">${esc(deep.final.quote)}</p>`:""}</div><div class="buttons"><button class="btn" onclick="ctaClick()">${esc(finalButtons.primary_button||"Получить программу Bella Vladi")}</button></div></div></section>
  <footer class="footer"><span>Bella Vladi · Face Protocol</span><span>${esc(report.footer)}</span></footer></div><div class="sticky-cta"><div class="sticky-inner"><span>Ваш персональный разбор готов</span><button class="btn" onclick="ctaClick()">${esc(finalButtons.primary_button||"Получить программу")}</button></div></div>`;
}
render(reportData);
function preloadReportImages(){const imgs=Array.from(document.querySelectorAll("img[data-protocol-image]"));return Promise.all(imgs.map((img)=>new Promise((resolve)=>{if(img.complete)return resolve(true);img.onload=()=>resolve(true);img.onerror=()=>resolve(false);setTimeout(()=>resolve(false),6000)})))}
window.preloadReportImages=preloadReportImages;
</script>
